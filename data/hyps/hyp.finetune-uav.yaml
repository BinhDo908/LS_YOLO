# Fine-tune hyperparameters for UAV-only landslide dataset
# Based on hyp.scratch-low.yaml but tuned for domain adaptation

lr0: 0.001             # 10x lower than scratch (avoid destroying pretrained weights)
lrf: 0.01              # final lr = lr0 * lrf = 1e-5
momentum: 0.937
weight_decay: 0.0005
warmup_epochs: 1.0     # less warmup needed for fine-tuning
warmup_momentum: 0.8
warmup_bias_lr: 0.1
box: 0.05
cls: 0.5
cls_pw: 1.0
obj: 1.0
obj_pw: 1.0
iou_t: 0.20
anchor_t: 4.0
fl_gamma: 0.0
hsv_h: 0.015
hsv_s: 0.7
hsv_v: 0.4
degrees: 15.0          # UAV imagery has varied rotation angles
translate: 0.1
scale: 0.5
shear: 0.0
perspective: 0.0
flipud: 0.5            # UAV can capture from any direction
fliplr: 0.5
mosaic: 1.0
mixup: 0.0
copy_paste: 0.0
